<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>G1 Joint State</title>
  <style>
    :root {
      --bg:        #0b1628;
      --surface:   #132040;
      --surface2:  #1a2d55;
      --border:    rgba(120,160,255,0.13);
      --text:      #e2ecff;
      --muted:     #7a96c8;
      --dim:       #3a5080;

      --left-leg:   #38bdf8;
      --right-leg:  #22d3ee;
      --waist:      #c084fc;
      --left-arm:   #4ade80;
      --right-arm:  #fb923c;

      --ok:    #34d399;
      --bad:   #f87171;
      --warn:  #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.25rem 1.5rem 3rem;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(56,189,248,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 80% 110%, rgba(192,132,252,0.05) 0%, transparent 60%);
    }

    /* ── Header ─────────────────────────────── */
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .logo {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #38bdf8 0%, #c084fc 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #0b1628;
    }
    h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; color: var(--text); }

    .pill {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.72rem; font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: color 0.2s, border-color 0.2s;
    }
    .pill .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--bad);
      transition: background 0.2s;
    }
    .pill.ok { color: var(--ok); border-color: rgba(52,211,153,0.3); }
    .pill.ok .dot { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    .pill.bad { color: var(--bad); border-color: rgba(248,113,113,0.3); }
    .action-btn {
      padding: 0.35rem 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(52,211,153,0.35);
      background: rgba(52,211,153,0.14);
      color: #b8ffe2;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .action-btn:hover {
      background: rgba(52,211,153,0.22);
      border-color: rgba(52,211,153,0.6);
    }

    /* ── IMU cards ──────────────────────────── */
    .imu-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .imu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.55rem 0.9rem;
      min-width: 9rem;
    }
    .imu-card .imu-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.2rem;
    }
    .imu-card .imu-val {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .meta-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.55rem 0.9rem;
    }
    .meta-card .imu-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.2rem; }
    .meta-card .imu-val  { font-size: 0.88rem; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

    /* ── Group grid ─────────────────────────── */
    .groups {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.85rem;
    }
    @media (max-width: 1300px) {
      .groups { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 860px) {
      .groups { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 540px) {
      .groups { grid-template-columns: 1fr; }
    }

    /* ── Group card ─────────────────────────── */
    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 28px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
    }
    .group-header {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.6rem 0.8rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .group-header .stripe {
      width: 4px; height: 18px; border-radius: 2px; flex-shrink: 0;
    }
    .group-card[data-group="left-leg"]   .group-header { background: rgba(56,189,248,0.1);  color: var(--left-leg);  border-bottom: 1px solid rgba(56,189,248,0.2); }
    .group-card[data-group="right-leg"]  .group-header { background: rgba(34,211,238,0.1);  color: var(--right-leg); border-bottom: 1px solid rgba(34,211,238,0.2); }
    .group-card[data-group="waist"]      .group-header { background: rgba(192,132,252,0.1); color: var(--waist);     border-bottom: 1px solid rgba(192,132,252,0.2); }
    .group-card[data-group="left-arm"]   .group-header { background: rgba(74,222,128,0.1);  color: var(--left-arm);  border-bottom: 1px solid rgba(74,222,128,0.2); }
    .group-card[data-group="right-arm"]  .group-header { background: rgba(251,146,60,0.1);  color: var(--right-arm); border-bottom: 1px solid rgba(251,146,60,0.2); }

    .group-card[data-group="left-leg"]   .stripe { background: var(--left-leg);  box-shadow: 0 0 8px var(--left-leg); }
    .group-card[data-group="right-leg"]  .stripe { background: var(--right-leg); box-shadow: 0 0 8px var(--right-leg); }
    .group-card[data-group="waist"]      .stripe { background: var(--waist);     box-shadow: 0 0 8px var(--waist); }
    .group-card[data-group="left-arm"]   .stripe { background: var(--left-arm);  box-shadow: 0 0 8px var(--left-arm); }
    .group-card[data-group="right-arm"]  .stripe { background: var(--right-arm); box-shadow: 0 0 8px var(--right-arm); }

    /* ── Table inside card ──────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.72rem;
    }
    thead th {
      padding: 0.3rem 0.6rem;
      text-align: left;
      color: var(--dim);
      font-weight: 500;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }
    td {
      padding: 0.28rem 0.55rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }

    td.idx {
      color: var(--dim);
      width: 1.6rem;
      font-size: 0.65rem;
      text-align: right;
      padding-right: 0.4rem;
    }
    td.name {
      color: var(--muted);
      max-width: 11rem;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    tbody tr:hover { background: rgba(120,160,255,0.06); }

    /* ── Footer ─────────────────────────────── */
    footer {
      margin-top: 1.5rem;
      font-size: 0.68rem;
      color: var(--dim);
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title">
      <div class="logo">G1</div>
      <h1>G1 Joint State Monitor</h1>
    </div>
    <span id="conn" class="pill bad"><span class="dot"></span>Disconnected</span>
    <button id="custom-start-btn" class="action-btn" type="button">Custom Controller Start</button>
  </header>

  <div class="imu-row">
    <div class="imu-card">
      <div class="imu-label">IMU Roll</div>
      <div class="imu-val" id="imu-roll">—</div>
    </div>
    <div class="imu-card">
      <div class="imu-label">IMU Pitch</div>
      <div class="imu-val" id="imu-pitch">—</div>
    </div>
    <div class="imu-card">
      <div class="imu-label">IMU Yaw</div>
      <div class="imu-val" id="imu-yaw">—</div>
    </div>
    <div class="meta-card">
      <div class="imu-label">Mode Machine</div>
      <div class="imu-val" id="mode-machine">—</div>
    </div>
    <div class="meta-card">
      <div class="imu-label">Elapsed Time (s)</div>
      <div class="imu-val" id="elapsed-s">—</div>
    </div>
  </div>

  <div class="groups" id="groups"></div>

  <footer>G1 GUI — 20 Hz WebSocket feed</footer>

  <script>
    const GROUPS = [
      { key: "left-leg",  label: "Left Leg",  indices: [0,1,2,3,4,5] },
      { key: "right-leg", label: "Right Leg", indices: [6,7,8,9,10,11] },
      { key: "waist",     label: "Waist",     indices: [12,13,14] },
      { key: "left-arm",  label: "Left Arm",  indices: [15,16,17,18,19,20,21] },
      { key: "right-arm", label: "Right Arm", indices: [22,23,24,25,26,27,28] },
    ];

    const JOINT_NAMES = [
      "left_hip_pitch",   "left_hip_roll",   "left_hip_yaw",
      "left_knee",        "left_ankle_pitch", "left_ankle_roll",
      "right_hip_pitch",  "right_hip_roll",  "right_hip_yaw",
      "right_knee",       "right_ankle_pitch","right_ankle_roll",
      "waist_yaw",        "waist_roll",       "waist_pitch",
      "L_shld_pitch",     "L_shld_roll",      "L_shld_yaw",
      "L_elbow",          "L_wrist_roll",     "L_wrist_pitch",
      "L_wrist_yaw",
      "R_shld_pitch",     "R_shld_roll",      "R_shld_yaw",
      "R_elbow",          "R_wrist_roll",     "R_wrist_pitch",
      "R_wrist_yaw",
    ];

    const cellsQ  = new Array(29);
    const cellsDq = new Array(29);

    const groupsEl = document.getElementById("groups");

    for (const g of GROUPS) {
      const card = document.createElement("div");
      card.className = "group-card";
      card.dataset.group = g.key;

      const hdr = document.createElement("div");
      hdr.className = "group-header";
      hdr.innerHTML = `<div class="stripe"></div>${g.label} <span style="margin-left:auto;font-weight:400;opacity:.6;font-size:.65rem;">${g.indices.length} joints</span>`;
      card.appendChild(hdr);

      const tbl = document.createElement("table");
      tbl.innerHTML = `
        <thead>
          <tr>
            <th>#</th>
            <th>Joint</th>
            <th style="text-align:right">q (rad)</th>
            <th style="text-align:right">dq (rad/s)</th>
          </tr>
        </thead>`;
      const tbody = document.createElement("tbody");
      for (const i of g.indices) {
        const tr = document.createElement("tr");
        tr.innerHTML =
          `<td class="idx">${i}</td>` +
          `<td class="name">${JOINT_NAMES[i]}</td>` +
          `<td class="num" id="q-${i}">—</td>` +
          `<td class="num" id="dq-${i}">—</td>`;
        tbody.appendChild(tr);
        cellsQ[i]  = null;
        cellsDq[i] = null;
      }
      tbl.appendChild(tbody);
      card.appendChild(tbl);
      groupsEl.appendChild(card);

      for (const i of g.indices) {
        cellsQ[i]  = document.getElementById(`q-${i}`);
        cellsDq[i] = document.getElementById(`dq-${i}`);
      }
    }

    const connEl  = document.getElementById("conn");
    const rollEl  = document.getElementById("imu-roll");
    const pitchEl = document.getElementById("imu-pitch");
    const yawEl   = document.getElementById("imu-yaw");
    const modeEl  = document.getElementById("mode-machine");
    const elapsedEl = document.getElementById("elapsed-s");
    const customStartBtn = document.getElementById("custom-start-btn");
    let wsRef = null;

    function fmt(v, d) { return Number(v).toFixed(d ?? 4); }

    function applyPayload(msg) {
      if (!msg || msg.type !== "joint_state") return;
      elapsedEl.textContent = Number(msg.elapsed_s ?? 0).toFixed(2);
      modeEl.textContent = msg.mode_machine ?? "—";
      if (Array.isArray(msg.imu_rpy)) {
        rollEl.textContent  = fmt(msg.imu_rpy[0], 3);
        pitchEl.textContent = fmt(msg.imu_rpy[1], 3);
        yawEl.textContent   = fmt(msg.imu_rpy[2], 3);
      }
      if (!msg.valid || !Array.isArray(msg.q) || !Array.isArray(msg.dq)) return;
      for (let i = 0; i < 29; i++) {
        if (cellsQ[i])  cellsQ[i].textContent  = fmt(msg.q[i]);
        if (cellsDq[i]) cellsDq[i].textContent = fmt(msg.dq[i]);
      }
    }

    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const wsUrl = `${proto}//${location.host}/ws`;

    function connect() {
      const ws = new WebSocket(wsUrl);
      wsRef = ws;
      ws.onopen = () => {
        connEl.textContent = "● Connected";
        connEl.className = "pill ok";
      };
      ws.onclose = () => {
        connEl.innerHTML = '<span class="dot"></span>Reconnecting…';
        connEl.className = "pill bad";
        setTimeout(connect, 1500);
      };
      ws.onerror = () => {
        connEl.innerHTML = '<span class="dot"></span>Error';
        connEl.className = "pill bad";
      };
      ws.onmessage = (ev) => {
        try { applyPayload(JSON.parse(ev.data)); } catch (_) {}
      };
    }
    connect();

    customStartBtn.addEventListener("click", () => {
      if (!wsRef || wsRef.readyState !== WebSocket.OPEN) return;
      wsRef.send("custom_controller_start");
    });
  </script>
</body>
</html>
